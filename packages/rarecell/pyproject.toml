[project]
name = "rarecell"
version = "0.1.0.dev1"
description = "Agentic, provenance-tracked isolation of rare and hard-to-resolve cell populations from single-cell RNA-seq"
authors = [{name = "Patrick Reed", email = "patrickjenningsreed@gmail.com"}]
license = "Apache-2.0"
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
  "scanpy>=1.10",
  "anndata>=0.10",
  "harmonypy>=0.0.9",
  "celltypist>=1.6",
  "scrublet",
  "scikit-learn>=1.3",
  "leidenalg>=0.10",
  "igraph>=0.11",
  "gseapy>=1.0",
  "pydantic>=2.6",
  "pyyaml>=6.0",
  "structlog>=24.1",
  "typer>=0.12",
  "h5py>=3.9",
  "pybiomart>=0.2",
  "numpy>=1.24",
  "pandas>=2.0",
  "scipy>=1.11",
  "matplotlib>=3.7",
  "seaborn>=0.13",
  "statsmodels>=0.14",
]

[project.scripts]
rarecell = "rarecell.cli:app"

[project.optional-dependencies]
agent = [
  "anthropic>=0.39",
  "rarecell-mcp-knowledge",
]
dev = [
  "pytest>=8",
  "pytest-cov",
  "hypothesis>=6",
  "ruff",
  "mypy",
  "pre-commit",
  "respx>=0.23",
]

[tool.uv.sources]
rarecell-mcp-knowledge = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rarecell"]
