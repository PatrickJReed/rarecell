schema_version: "1.0"
profile_id: "preset-t-cell-cns-v0.1"
name: "T cells, CNS"
description: "Pan T-cell isolation from postmortem brain or spinal cord snRNA-seq. Uses immune-sensitive permissive QC (150-gene floor) to retain low-RNA T-cell nuclei. NOTE: brain-trained CellTypist model is not bundled — see docs."
target_lineage: "lymphoid"
tissue: ["brain", "spinal_cord"]
expected_abundance:
  min_fraction: 0.0001
  max_fraction: 0.05
  notes: "<0.1% typical for postmortem snRNA-seq"

positive_markers:
  pan_t_cell:
    genes: [CD3D, CD3E, CD3G, CD2, CD7, TRAC, TRBC1, TRBC2]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:T cells", source: "panglaodb"}
  cd4_t_cell:
    genes: [CD4, IL7R, CCR7, LEF1, TCF7]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:T helper cells", source: "panglaodb"}
  cd8_t_cell:
    genes: [CD8A, CD8B, GZMK, GZMB, PRF1, NKG7]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:T cytotoxic cells", source: "panglaodb"}
  treg:
    genes: [FOXP3, IL2RA, CTLA4, IKZF2]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:T regulatory cells", source: "panglaodb"}
  exhausted_checkpoint:
    genes: [PDCD1, LAG3, HAVCR2, TIGIT, TOX]
    threshold_z: 1.0
    citations:
      - {source_id: "37106742", source: "pubmed"}
  tissue_resident_memory:
    genes: [ITGAE, ZNF683, CXCR6]
    threshold_z: 1.0
    citations:
      - {source_id: "canonical tissue-resident memory T-cell markers", source: "manual"}
  activation:
    genes: [CD69, HLA-DRA, ICOS, CD44]
    threshold_z: 1.0
    citations:
      - {source_id: "canonical T-cell activation markers", source: "manual"}

negative_markers:
  neuron:
    genes: [RBFOX3, SYT1, SNAP25, NRGN, SLC17A7]
    exclusion_threshold_z: 1.5
  astrocyte:
    genes: [AQP4, GFAP, SLC1A2, GJA1, ALDH1L1]
    exclusion_threshold_z: 1.5
  oligodendrocyte:
    genes: [MBP, MOG, PLP1, MAG, MOBP]
    exclusion_threshold_z: 1.5
  opc:
    genes: [PDGFRA, CSPG4, VCAN, SOX10]
    exclusion_threshold_z: 1.5
  endothelial:
    genes: [CLDN5, FLT1, PECAM1, VWF]
    exclusion_threshold_z: 1.5
  microglia:
    genes: [CX3CR1, P2RY12, TMEM119, AIF1]
    exclusion_threshold_z: 1.5

reference_labels:
  celltypist_models:
    - model: "Immune_All_Low.pkl"
      match_patterns: ["T cell", "Tcm", "Tem", "Treg", "Th1", "Th2", "Th17",
                       "CD4", "CD8", "MAIT", "NKT", "gdT"]
      enabled: true
    # PsychAD MSSM brain-trained CellTypist model. NOT bundled with rarecell.
    # See docs for how to obtain — until then, leave enabled=false.
    - model: "MSSM_BrainCellTypes_v1.pkl"
      match_patterns: ["T cell", "Tcell", "Lymphocyte"]
      enabled: false

biccn_rules:
  enabled: true
  class_filter: ["TCELL"]
  subclass_filter: ["TCELL", "BCELL", "MGL", "MONO", "MAC", "NK"]

qc:
  min_genes_per_cell: 150
  max_pct_mt: 10
  max_genes_per_cell: 10000
  min_cells_per_gene: 3
  rationale: "Permissive floor preserves small low-RNA nuclei"

purify:
  enabled: true
  high_resolution: 2.0
  min_cluster_purity: 0.7

batch_correction:
  in_dataset: "harmony"
  batch_key: "sample_id"

auto_policy:
  gates:
    gate1_cluster_decisions: "recommendation"
    gate2_purify_decisions: "recommendation"
    gate3_final: "accept"

frozen: false
human_reviewed: false
