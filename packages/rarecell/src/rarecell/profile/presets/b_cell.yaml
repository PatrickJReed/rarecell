schema_version: "1.0"
profile_id: "preset-b-cell-v0.1"
name: "B cells"
description: "Pan B-cell isolation from PBMC, blood, or lymph-node single-cell RNA-seq"
target_lineage: "lymphoid"
tissue: ["blood", "pbmc", "lymph_node"]
expected_abundance:
  min_fraction: 0.02
  max_fraction: 0.30
  notes: "B cells are 5-20% of PBMC lymphocytes"

positive_markers:
  pan_b:
    genes: [MS4A1, CD79A, CD79B, CD19, BANK1]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:B_cell", source: "panglaodb"}

negative_markers:
  t_cell:
    genes: [CD3D, CD3E, CD3G]
    exclusion_threshold_z: 1.5
  nk_cell:
    genes: [NCAM1, NKG7, KLRD1]
    exclusion_threshold_z: 1.5
  myeloid:
    genes: [CD14, LYZ, S100A8]
    exclusion_threshold_z: 1.5

reference_labels:
  celltypist_models:
    - model: "Immune_All_Low.pkl"
      match_patterns: ["B cell", "Plasma", "Memory B", "Naive B"]
      enabled: true

biccn_rules:
  enabled: false

qc:
  min_genes_per_cell: 200
  max_pct_mt: 10
  max_genes_per_cell: 10000
  min_cells_per_gene: 3
  rationale: "Standard PBMC QC"

purify:
  enabled: true
  high_resolution: 2.0
  min_cluster_purity: 0.7

batch_correction:
  in_dataset: "harmony"
  batch_key: "sample_id"

auto_policy:
  gates:
    gate1_cluster_decisions: "recommendation"
    gate2_purify_decisions: "recommendation"
    gate3_final: "accept"

frozen: false
human_reviewed: false
