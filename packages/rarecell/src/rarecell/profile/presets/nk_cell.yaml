schema_version: "1.0"
profile_id: "preset-nk-cell-v0.1"
name: "NK cells"
description: "Pan NK-cell isolation from peripheral blood single-cell RNA-seq"
target_lineage: "lymphoid"
tissue: ["blood", "pbmc"]
expected_abundance:
  min_fraction: 0.05
  max_fraction: 0.20
  notes: "NK cells are 5-15% of PBMC lymphocytes"

positive_markers:
  pan_nk:
    genes: [NCAM1, NKG7, GNLY, KLRD1, FCGR3A, KLRF1]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:NK_cell", source: "panglaodb"}

negative_markers:
  t_cell:
    genes: [CD3D, CD3E, CD3G]
    exclusion_threshold_z: 1.5
  b_cell:
    genes: [MS4A1, CD79A]
    exclusion_threshold_z: 1.5
  myeloid:
    genes: [CD14, LYZ]
    exclusion_threshold_z: 1.5

reference_labels:
  celltypist_models:
    - model: "Immune_All_Low.pkl"
      match_patterns: ["NK", "NKT"]
      enabled: true

biccn_rules:
  enabled: false

qc:
  min_genes_per_cell: 200
  max_pct_mt: 10
  max_genes_per_cell: 10000
  min_cells_per_gene: 3
  rationale: "Standard PBMC QC"

purify:
  enabled: true
  high_resolution: 2.0
  min_cluster_purity: 0.7

batch_correction:
  in_dataset: "harmony"
  batch_key: "sample_id"

auto_policy:
  gates:
    gate1_cluster_decisions: "recommendation"
    gate2_purify_decisions: "recommendation"
    gate3_final: "accept"

frozen: false
human_reviewed: false
