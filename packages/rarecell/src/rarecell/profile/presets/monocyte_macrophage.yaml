schema_version: "1.0"
profile_id: "preset-monocyte-macrophage-v0.1"
name: "Monocytes and macrophages"
description: "Monocyte and macrophage isolation from peripheral blood or tissue single-cell RNA-seq"
target_lineage: "myeloid"
tissue: ["blood", "pbmc", "tissue"]
expected_abundance:
  min_fraction: 0.05
  max_fraction: 0.40
  notes: "Monocytes are 10-30% of PBMC; tissue macrophages vary widely"

positive_markers:
  pan_mono_mac:
    genes: [CD14, FCGR3A, LYZ, CST3, S100A8, CD68]
    threshold_z: 1.0
    citations:
      - {source_id: "panglaodb:Monocyte", source: "panglaodb"}

negative_markers:
  t_cell:
    genes: [CD3D, CD3E]
    exclusion_threshold_z: 1.5
  b_cell:
    genes: [MS4A1, CD79A]
    exclusion_threshold_z: 1.5
  nk_cell:
    genes: [NCAM1, NKG7]
    exclusion_threshold_z: 1.5
  neutrophil:
    genes: [FCGR3B, CSF3R, S100A12]
    exclusion_threshold_z: 1.5

reference_labels:
  celltypist_models:
    - model: "Immune_All_Low.pkl"
      match_patterns: ["Monocyte", "Macrophage", "Mono", "Mac",
                       "Classical mono", "Non-classical mono"]
      enabled: true

biccn_rules:
  enabled: false

qc:
  min_genes_per_cell: 200
  max_pct_mt: 10
  max_genes_per_cell: 10000
  min_cells_per_gene: 3
  rationale: "Standard PBMC QC"

purify:
  enabled: true
  high_resolution: 2.0
  min_cluster_purity: 0.7

batch_correction:
  in_dataset: "harmony"
  batch_key: "sample_id"

auto_policy:
  gates:
    gate1_cluster_decisions: "recommendation"
    gate2_purify_decisions: "recommendation"
    gate3_final: "accept"

frozen: false
human_reviewed: false
